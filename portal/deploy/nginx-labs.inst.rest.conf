# Пример для Nginx: положить в /etc/nginx/sites-available/labs.inst.rest
# и сделать symlink в sites-enabled. Проверка: sudo nginx -t && sudo systemctl reload nginx
#
# Сертификат Let's Encrypt (после certbot) обычно подключают через:
#   include /etc/letsencrypt/options-ssl-nginx.conf;
#   ssl_certificate /etc/letsencrypt/live/labs.inst.rest/fullchain.pem;
#   ssl_certificate_key /etc/letsencrypt/live/labs.inst.rest/privkey.pem;

upstream streamlit_portal {
    server 127.0.0.1:8500;
}
upstream streamlit_lab1 {
    server 127.0.0.1:8501;
}
upstream streamlit_lab2 {
    server 127.0.0.1:8502;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name labs.inst.rest;

    # После получения сертификата раскомментируйте редирект на HTTPS:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://streamlit_portal;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    location /lab1/ {
        proxy_pass http://streamlit_lab1/lab1/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    location /lab2/ {
        proxy_pass http://streamlit_lab2/lab2/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

# Раскомментируйте второй server {} для HTTPS после certbot --nginx (или вставьте блок,
# который сгенерирует certbot).
